<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Noesis</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #11100f;
        color: #f7f3ea;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(124, 58, 237, 0.24), transparent 32%),
          linear-gradient(180deg, #171412 0%, #0d0c0b 100%);
      }

      main {
        max-width: 360px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 42px;
        font-style: italic;
      }

      p {
        margin: 0;
        color: rgba(247, 243, 234, 0.72);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Noesis</h1>
      <p>The mobile shell is ready. Connect to the internet to load your private philosophy workspace.</p>
    </main>
  </body>
</html>
